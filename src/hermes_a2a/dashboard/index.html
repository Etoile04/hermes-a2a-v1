<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes A2A Gateway — Monitoring Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232734;
  --border: #2e3348;
  --text: #e0e0e8;
  --text-dim: #8b8fa3;
  --accent: #6c8cff;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header .status-badge {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
}
.status-ok { background: rgba(74,222,128,0.15); color: var(--green); }
.status-degraded { background: rgba(251,191,36,0.15); color: var(--yellow); }
.status-error { background: rgba(248,113,113,0.15); color: var(--red); }

.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Overview cards */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
}
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; }
.card .value.green { color: var(--green); }
.card .value.red { color: var(--red); }
.card .value.blue { color: var(--blue); }

/* Two-column layout */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

.section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

/* Peer cards */
.peer-grid { display: grid; gap: 10px; }
.peer-card {
  background: var(--surface2);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.peer-indicator {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.peer-indicator.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
.peer-indicator.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
.peer-indicator.unknown { background: var(--yellow); }
.peer-name { font-weight: 500; flex: 1; }
.peer-status { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

/* Tasks table */
.tasks-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tasks-table th {
  text-align: left; padding: 10px 12px;
  background: var(--surface2); color: var(--text-dim);
  font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
.tasks-table td { padding: 10px 12px; border-top: 1px solid var(--border); }
.tasks-table tr:hover { background: rgba(108,140,255,0.05); }

/* Charts */
.chart-container { position: relative; height: 220px; }

/* Connection indicator */
.ws-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
.ws-dot { width: 8px; height: 8px; border-radius: 50%; }
.ws-dot.connected { background: var(--green); }
.ws-dot.disconnected { background: var(--red); }

.empty-state { color: var(--text-dim); text-align: center; padding: 30px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>Hermes A2A Gateway</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="ws-indicator">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">Connecting…</span>
    </div>
    <div class="status-badge status-ok" id="healthBadge">Loading…</div>
  </div>
</div>

<div class="container">
  <!-- Overview cards -->
  <div class="overview-grid">
    <div class="card"><div class="label">Uptime</div><div class="value" id="uptime">—</div></div>
    <div class="card"><div class="label">Requests</div><div class="value blue" id="requests">0</div></div>
    <div class="card"><div class="label">Errors</div><div class="value red" id="errors">0</div></div>
    <div class="card"><div class="label">Active Tasks</div><div class="value" id="activeTasks">0</div></div>
    <div class="card"><div class="label">Peers</div><div class="value green" id="peerCount">0</div></div>
  </div>

  <!-- Charts + Peers -->
  <div class="main-grid">
    <div>
      <div class="section-title">Request Volume</div>
      <div class="card"><div class="chart-container"><canvas id="requestChart"></canvas></div></div>
      <div style="margin-top:16px">
        <div class="section-title">Latency (ms)</div>
        <div class="card"><div class="chart-container"><canvas id="latencyChart"></canvas></div></div>
      </div>
    </div>
    <div>
      <div class="section-title">Peer Status</div>
      <div class="card" style="max-height:460px;overflow-y:auto">
        <div class="peer-grid" id="peerGrid">
          <div class="empty-state">No peers configured</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent tasks -->
  <div>
    <div class="section-title">Recent Tasks</div>
    <div class="card" style="overflow-x:auto">
      <table class="tasks-table">
        <thead><tr><th>Task ID</th><th>Context</th><th>Status</th><th>Updated</th></tr></thead>
        <tbody id="tasksBody">
          <tr><td colspan="4" class="empty-state">No tasks</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ---- State ----
const state = { requests: [], latencies: [], peers: {}, tasks: [] };
const MAX_POINTS = 30;

// ---- Charts ----
const requestChart = new Chart(document.getElementById('requestChart'), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Requests', data: [], borderColor: '#6c8cff', backgroundColor: 'rgba(108,140,255,0.1)', fill: true, tension: 0.3 }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8fa3' } } } }
});

const latencyChart = new Chart(document.getElementById('latencyChart'), {
  type: 'bar',
  data: { labels: ['p50', 'p95', 'p99'], datasets: [{ label: 'Latency (ms)', data: [0, 0, 0], backgroundColor: ['#60a5fa', '#6c8cff', '#818cf8'] }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b8fa3' }, grid: { display: false } }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8fa3' } } } }
});

// ---- Helpers ----
function ts() { const d = new Date(); return d.toLocaleTimeString(); }

function updateOverview(metrics) {
  document.getElementById('requests').textContent = metrics.request_count ?? 0;
  document.getElementById('errors').textContent = metrics.errors_total ?? 0;
  document.getElementById('activeTasks').textContent = metrics.active_tasks ?? 0;
  const peers = metrics.peer_health ?? {};
  const count = Object.keys(peers).length;
  document.getElementById('peerCount').textContent = count;
  renderPeers(peers);
}

function renderPeers(peers) {
  const grid = document.getElementById('peerGrid');
  const names = Object.keys(peers);
  if (!names.length) { grid.innerHTML = '<div class="empty-state">No peers configured</div>'; return; }
  grid.innerHTML = names.map(n => {
    const s = peers[n];
    const cls = s === 'up' ? 'up' : s === 'down' ? 'down' : 'unknown';
    return `<div class="peer-card"><div class="peer-indicator ${cls}"></div><div class="peer-name">${n}</div><div class="peer-status">${s}</div></div>`;
  }).join('');
}

function updateTasks(tasks) {
  const body = document.getElementById('tasksBody');
  if (!tasks.length) { body.innerHTML = '<tr><td colspan="4" class="empty-state">No tasks</td></tr>'; return; }
  body.innerHTML = tasks.slice(0, 20).map(t => {
    const st = t.status || {};
    const stateVal = typeof st === 'object' ? (st.state ?? '—') : st;
    return `<tr><td>${t.id || '—'}</td><td>${t.contextId || '—'}</td><td>${stateVal}</td><td>${ts()}</td></tr>`;
  }).join('');
}

function pushChartPoint(reqCount, lat) {
  state.requests.push(reqCount);
  if (state.requests.length > MAX_POINTS) state.requests.shift();
  requestChart.data.labels = state.requests.map((_, i) => i);
  requestChart.data.datasets[0].data = [...state.requests];
  requestChart.update('none');

  latencyChart.data.datasets[0].data = [lat.p50 || 0, lat.p95 || 0, lat.p99 || 0];
  latencyChart.update('none');
}

// ---- Data fetching ----
async function fetchJSON(url) { try { const r = await fetch(url); return r.json(); } catch { return null; } }

async function loadHealth() {
  const d = await fetchJSON('/health');
  if (!d) return;
  const badge = document.getElementById('healthBadge');
  badge.textContent = d.status.toUpperCase();
  badge.className = 'status-badge ' + (d.status === 'ok' ? 'status-ok' : 'status-degraded');
  if (d.uptime_seconds != null) {
    const h = Math.floor(d.uptime_seconds / 3600);
    const m = Math.floor((d.uptime_seconds % 3600) / 60);
    document.getElementById('uptime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
  }
}

async function loadMetrics() {
  const d = await fetchJSON('/admin/metrics');
  if (!d) return;
  document.getElementById('requests').textContent = d.requests_total ?? 0;
  document.getElementById('errors').textContent = d.errors_total ?? 0;
  document.getElementById('activeTasks').textContent = d.total_tasks ?? 0;
  const enabled = (d.peer_count ?? 0);
  document.getElementById('peerCount').textContent = enabled;
}

async function loadPeers() {
  const d = await fetchJSON('/admin/peers');
  if (!d || !d.peers) return;
  const peers = {};
  d.peers.forEach(p => { peers[p.name] = p.status === 'available' ? 'up' : 'down'; });
  renderPeers(peers);
}

async function loadTasks() {
  const d = await fetchJSON('/admin/tasks?limit=20');
  if (!d) return;
  updateTasks(d.tasks || []);
}

// ---- SSE stream ----
function connectSSE() {
  const es = new EventSource('/admin/metrics/stream');
  es.addEventListener('metrics', (e) => {
    try {
      const m = JSON.parse(e.data);
      updateOverview(m);
      pushChartPoint(m.request_count, { p50: m.latency_p50, p95: m.latency_p95, p99: m.latency_p99 });
    } catch {}
  });
  return es;
}

// ---- WebSocket ----
let ws = null;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/admin/ws`);
  ws.onopen = () => {
    document.getElementById('wsDot').className = 'ws-dot connected';
    document.getElementById('wsLabel').textContent = 'Live';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').className = 'ws-dot disconnected';
    document.getElementById('wsLabel').textContent = 'Disconnected';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'task_created' || msg.type === 'task_completed' || msg.type === 'task_failed') {
        loadTasks();
      } else if (msg.type === 'peer_status') {
        loadPeers();
      } else if (msg.type === 'metrics_tick') {
        updateOverview(msg.data);
      }
    } catch {}
  };
}

// ---- Init ----
(async () => {
  await Promise.all([loadHealth(), loadMetrics(), loadPeers(), loadTasks()]);
  connectSSE();
  connectWS();
  setInterval(loadHealth, 10000);
})();
</script>
</body>
</html>
